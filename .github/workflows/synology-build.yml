name: Synology NAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Synology Platform'
        required: true
        default: 'geminilake'
        type: choice
        options:
          - alpine
          - alpine4k
          - apollolake
          - armada37xx
          - armada38x
          - avoton
          - broadwell
          - broadwellnk
          - broadwellnkv2
          - broadwellntbap
          - bromolow
          - braswell
          - denverton
          - epyc7002
          - geminilake
          - grantley
          - kvmx64
          - monaco
          - purley
          - r1000
          - rtd1296
          - rtd1619b
          - v1000
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but usually it's fine for C++ builds
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Synology Package
        env:
          PLATFORM: ${{ github.event.inputs.platform || 'geminilake' }}
          DOCKER_CUSTOM_BUILDER: ${{ steps.buildx.outputs.name }}
        run: |
          chmod +x build/SynologyNAS/generate_pkg.sh
          ./build/SynologyNAS/generate_pkg.sh "$PLATFORM"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: megacmd-synology-${{ github.event.inputs.platform || 'geminilake' }}
          path: build/SynologyNAS/packages/${{ github.event.inputs.platform || 'geminilake' }}/*.spk

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/SynologyNAS/packages/${{ github.event.inputs.platform || 'geminilake' }}/*.spk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
